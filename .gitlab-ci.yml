image: python:3.8

stages:
  - publish
  
build_and_push:
  image: docker:latest
  stage: publish
  services:
    - docker:dind
  only:
    - tags
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker build -t "$DOCKERHUB_USERNAME/bioconda_importer:$CI_COMMIT_TAG" -f Dockerfile .
    - docker push "$DOCKERHUB_USERNAME/bioconda_importer:$CI_COMMIT_TAG"
  after_script: