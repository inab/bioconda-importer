image: registry.gitlab.bsc.es/inb/elixir/software-observatory/bioconda-importer:latest

stages:
  - test
  - main_task  

tests: 
  stage: test
  script: 
    - pip install pytest
    - pip install pytest-mock
    - pytest -v --junitxml=report.xml "$CI_PROJECT_DIR/test"
  artifacts:
    when: always
    reports:
      junit: report.xml


run_metadata_import:
  stage: main_task
  before_script:
    - apk add --no-cache bash 
  script:
    - pip install --cache-dir .pip_cache/ -r requirements.txt
    - echo "⚙️ Running main task"
    - conda run --no-capture-output -n bioconda-dev python3 main.py -l=DEBUG
    - |
      echo -e "\n\
      ✨ Execution finished\n\
      \n\"
  artifacts:
    expire_in: 4 weeks
  cache:
    paths:
      - .pip_cache/
    key: "${CI_COMMIT_REF_SLUG}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  timeout: 4h
